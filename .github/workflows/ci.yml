name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: mvn -B -ntp -DskipTests compile

  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -B -ntp test

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Materialize keystore from GitHub Secret
        if: ${{ secrets.TLS_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p certs
          echo "${{ secrets.TLS_KEYSTORE_BASE64 }}" | base64 -d > certs/server-keystore.p12

      - name: Package
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          TLS_KEYSTORE_PASSWORD: ${{ secrets.TLS_KEYSTORE_PASSWORD }}
          TLS_KEY_ALIAS: ${{ secrets.TLS_KEY_ALIAS }}
        run: mvn -B -ntp -DskipTests package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antivirus-jar
          path: target/*.jar
          if-no-files-found: error
